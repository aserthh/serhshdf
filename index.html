<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Chernobyl — Gibi</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #111;
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  align-items: center;
  font-family: sans-serif;
  overflow: hidden;
}

.book {
  flex: 1;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.page img {
  width: auto;
  height: auto;
  max-width: min(92vw, 560px);
  max-height: calc(100dvh - 90px);
  object-fit: contain;
  display: block;
  border-radius: 3px;
  box-shadow: 0 4px 32px rgba(0,0,0,0.9);
}
.page.p-wide img { max-width: min(92vw, 672px); }

@keyframes fadeOut     { to { opacity:0; transform:scale(1.04); } }
@keyframes fadeIn      { from { opacity:0; transform:scale(0.96); } }
@keyframes fadeOutBack { to { opacity:0; transform:scale(0.96); } }
@keyframes fadeInBack  { from { opacity:0; transform:scale(1.04); } }

.fade-out      { animation: fadeOut     0.28s ease-in  forwards; z-index:2; }
.fade-in       { animation: fadeIn      0.28s ease-out forwards; z-index:3; }
.fade-out-back { animation: fadeOutBack 0.28s ease-in  forwards; z-index:2; }
.fade-in-back  { animation: fadeInBack  0.28s ease-out forwards; z-index:3; }

.controls {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 10px 16px;
  padding-bottom: max(10px, env(safe-area-inset-bottom));
  width: 100%;
  justify-content: center;
}

button {
  background: none;
  border: 1.5px solid #555;
  color: #ccc;
  font-size: 0.88rem;
  padding: 10px 20px;
  border-radius: 4px;
  cursor: pointer;
  transition: border-color .15s, color .15s;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
button:hover:not(:disabled) { border-color: #aaa; color: #fff; }
button:disabled { opacity: 0.2; cursor: default; }
.counter { color: #666; font-size: 0.85rem; min-width: 52px; text-align: center; }

.dots {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 16px 12px;
}
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #333; border: 1px solid #555;
  cursor: pointer; transition: background .15s;
}
.dot.active { background: #fff; border-color: #fff; }

.spinner {
  width: 32px; height: 32px;
  border: 2px solid #333;
  border-top-color: #777;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="book" id="book">
  <div class="spinner" id="spinner"></div>
</div>

<div class="controls">
  <button id="btnPrev" onclick="go(-1)" disabled>&#9664; Anterior</button>
  <span class="counter" id="counter">1 / 17</span>
  <button id="btnNext" onclick="go(1)" disabled>Próxima &#9654;</button>
</div>

<div class="dots" id="dots"></div>

<script>
const BASE_CONTENT = 'https://github.com/aserthh/ideal-umbrella/blob/main/';
const COVER     = 'https://github.com/aserthh/ideal-umbrella/blob/main/primera.png?raw=true';
const BACKCOVER = 'https://github.com/aserthh/ideal-umbrella/blob/main/ultima.png?raw=true';
const CONTENT_PAGES = 15;
const TOTAL = CONTENT_PAGES + 2;

function srcFor(i) {
  if (i === 0)          return COVER;
  if (i === TOTAL - 1)  return BACKCOVER;
  if (i === 8)          return BASE_CONTENT + '8%20(1).png?raw=true';
  return BASE_CONTENT + i + '.png?raw=true';
}


function isWide(i) { return i === 15; }

const cache = {};

function preload(i) {
  if (i < 0 || i >= TOTAL || cache[i]) return;
  const img = new Image();
  img.src = srcFor(i);
  cache[i] = img;
}

preload(0); preload(1); preload(2);

let current = 0;
let busy = false;

const book    = document.getElementById('book');
const spinner = document.getElementById('spinner');
const counter = document.getElementById('counter');
const btnPrev = document.getElementById('btnPrev');
const btnNext = document.getElementById('btnNext');
const dotsEl  = document.getElementById('dots');

for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.onclick = () => jumpTo(i);
  dotsEl.appendChild(d);
}

function makePage(i) {
  const wrap = document.createElement('div');
  wrap.className = 'page' + (isWide(i) ? ' p-wide' : '');
  const img = document.createElement('img');
  img.src = srcFor(i);
  img.alt = i === 0 ? 'Capa' : i === TOTAL - 1 ? 'Contracapa' : `Página ${i}`;
  img.draggable = false;
  wrap.appendChild(img);
  return wrap;
}

function whenReady(i, cb) {
  if (!cache[i]) preload(i);
  const img = cache[i];
  if (img.complete && img.naturalWidth > 0) {
    setTimeout(cb, 0);
  } else {
    img.onload  = () => setTimeout(cb, 0);
    img.onerror = () => setTimeout(cb, 0);
  }
}

whenReady(0, () => {
  spinner.remove();
  book.appendChild(makePage(0));
  updateUI();
  btnNext.disabled = false;
});

function updateUI() {
  counter.textContent = `${current + 1} / ${TOTAL}`;
  btnPrev.disabled = current === 0;
  btnNext.disabled = current === TOTAL - 1;
  document.querySelectorAll('.dot').forEach((d, i) =>
    d.classList.toggle('active', i === current));
  preload(current + 1);
  preload(current + 2);
  preload(current - 1);
}

function go(dir) {
  const next = current + dir;
  if (busy || next < 0 || next >= TOTAL) return;
  busy = true;
  btnPrev.disabled = true;
  btnNext.disabled = true;

  whenReady(next, () => {
    const outPage = book.querySelector('.page');
    const inPage  = makePage(next);
    book.appendChild(inPage);

    if (dir > 0) {
      outPage.classList.add('fade-out');
      inPage.classList.add('fade-in');
    } else {
      outPage.classList.add('fade-out-back');
      inPage.classList.add('fade-in-back');
    }

    setTimeout(() => {
      outPage.remove();
      inPage.classList.remove('fade-in', 'fade-in-back');
      current = next;
      busy = false;
      updateUI();
    }, 300);
  });
}

function jumpTo(i) {
  if (busy || i === current) return;
  busy = true;
  whenReady(i, () => {
    book.querySelectorAll('.page').forEach(p => p.remove());
    book.appendChild(makePage(i));
    current = i;
    busy = false;
    updateUI();
  });
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); go(1); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
});

let tx = null;
book.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, {passive:true});
book.addEventListener('touchend', e => {
  if (tx === null) return;
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) go(dx < 0 ? 1 : -1);
  tx = null;
}, {passive:true});
</script>
</body>
</html>
